# ══════════════════════════════════════════════════════════
# flox-sbx — Consumer Sandbox Environment
# ══════════════════════════════════════════════════════════
#
# `flox activate` alone gives shell-level enforcement:
#   - PATH wipe (only $FLOX_ENV/bin)
#   - Requisites filtering (symlink bin)
#   - Function armor (26 package managers blocked)
#   - fs-filter (write command path checking)
#   - Python enforcement (ensurepip block, open() wrap)
#
# `sandflox elevate` adds kernel enforcement (sandbox-exec SBPL)
#
# Usage:
#   cd environments/flox-sbx
#   flox activate          # shell enforcement active
#   sandflox elevate       # adds kernel tier
#
schema-version = "1.11.0"

# ── Options ──────────────────────────────────────────────
# macOS-only: sandbox-exec is Darwin-specific
[options]
systems = ["aarch64-darwin", "x86_64-darwin"]

# ── Packages ─────────────────────────────────────────────
[install]
sandflox.pkg-path = "8BitTacoSupreme/sandflox"
sandflox.systems = ["aarch64-darwin"]

bash.pkg-path = "bash"
bash.outputs = "all"
coreutils.pkg-path = "coreutils"
coreutils.outputs = "all"
python3.pkg-path = "python3"
jq.pkg-path = "jq"
jq.outputs = "all"
curl.pkg-path = "curl"
curl.outputs = "all"
git.pkg-path = "git"
git.outputs = "all"
gnugrep.pkg-path = "gnugrep"
gnugrep.outputs = "all"
gnused.pkg-path = "gnused"
gnused.outputs = "all"
gawk.pkg-path = "gawk"
gawk.outputs = "all"
findutils.pkg-path = "findutils"
findutils.outputs = "all"
diffutils.pkg-path = "diffutils"
diffutils.outputs = "all"
file.pkg-path = "file"
file.outputs = "all"

# claude-code: install via `npm install -g @anthropic/claude-code`
# after activation (before function armor applies). Or add nodejs
# here and include a hook step for npm install.

# ── Hook: on-activate ───────────────────────────────────
# Runs once per activation. Wipes PATH and generates enforcement
# artifacts via `sandflox prepare`.
[hook]
on-activate = """
  # ── Layer 1: PATH wipe ──────────────────────────────────
  # Remove all system paths. After this, only $FLOX_ENV/bin is on PATH.
  export PATH="$FLOX_ENV/bin"

  # ── Layer 5: Generate enforcement artifacts ─────────────
  # sandflox prepare writes to $FLOX_ENV_CACHE/sandflox/:
  #   entrypoint.sh, fs-filter.sh, usercustomize.py,
  #   config.json, requisites.txt, path lists, mode files
  #
  # Three-tier fallback:
  #   1. SANDFLOX_POLICY_PATH env var (explicit override)
  #   2. FLOX_ENV_PROJECT/policy.toml (developer's project)
  #   3. Bare `sandflox prepare` (uses embedded default policy)
  _sfx_policy="${SANDFLOX_POLICY_PATH:-}"
  if [ -n "$_sfx_policy" ] && [ -f "$_sfx_policy" ]; then
    sandflox prepare -policy "$_sfx_policy" || \
      echo "[flox-sbx] WARNING: sandflox prepare failed -- profile fallback will apply" >&2
  elif [ -n "${FLOX_ENV_PROJECT:-}" ] && [ -f "${FLOX_ENV_PROJECT}/policy.toml" ]; then
    sandflox prepare -policy "${FLOX_ENV_PROJECT}/policy.toml" || \
      echo "[flox-sbx] WARNING: sandflox prepare failed -- profile fallback will apply" >&2
  else
    # No policy.toml found anywhere -- sandflox prepare uses embedded default
    sandflox prepare || \
      echo "[flox-sbx] WARNING: sandflox prepare failed -- profile fallback will apply" >&2
  fi

  # ── Layer 4: Breadcrumb cleanup ─────────────────────────
  unset FLOX_ENV_PROJECT FLOX_ENV_DIRS FLOX_PATH_PATCHED
"""

# ── Profile: common ─────────────────────────────────────
# Runs in every shell. Sources the generated entrypoint for full
# enforcement, or falls back to inline basics if prepare failed.
[profile]
common = """
  if [ -f "${FLOX_ENV_CACHE}/sandflox/entrypoint.sh" ]; then
    # Full enforcement: generated by sandflox prepare
    source "${FLOX_ENV_CACHE}/sandflox/entrypoint.sh"
  else
    # ── Fallback: inline basics ─────────────────────────────
    # If sandflox prepare failed or policy.toml was missing, apply
    # minimal shell enforcement directly.

    # PATH restriction: only FLOX_ENV/bin
    export PATH="$FLOX_ENV/bin"

    # Function armor: block 26 package managers
    _sandflox_blocked() {
      echo "[sandflox] BLOCKED: $1 is not available. Environment is immutable." >&2
      return 126
    }
    unalias flox 2>/dev/null; flox() { _sandflox_blocked flox; }
    unalias nix 2>/dev/null; nix() { _sandflox_blocked nix; }
    unalias nix-env 2>/dev/null; nix-env() { _sandflox_blocked nix-env; }
    unalias nix-store 2>/dev/null; nix-store() { _sandflox_blocked nix-store; }
    unalias nix-shell 2>/dev/null; nix-shell() { _sandflox_blocked nix-shell; }
    unalias nix-build 2>/dev/null; nix-build() { _sandflox_blocked nix-build; }
    unalias apt 2>/dev/null; apt() { _sandflox_blocked apt; }
    unalias apt-get 2>/dev/null; apt-get() { _sandflox_blocked apt-get; }
    unalias yum 2>/dev/null; yum() { _sandflox_blocked yum; }
    unalias dnf 2>/dev/null; dnf() { _sandflox_blocked dnf; }
    unalias brew 2>/dev/null; brew() { _sandflox_blocked brew; }
    unalias snap 2>/dev/null; snap() { _sandflox_blocked snap; }
    unalias flatpak 2>/dev/null; flatpak() { _sandflox_blocked flatpak; }
    unalias pip 2>/dev/null; pip() { _sandflox_blocked pip; }
    unalias pip3 2>/dev/null; pip3() { _sandflox_blocked pip3; }
    unalias npm 2>/dev/null; npm() { _sandflox_blocked npm; }
    unalias npx 2>/dev/null; npx() { _sandflox_blocked npx; }
    unalias yarn 2>/dev/null; yarn() { _sandflox_blocked yarn; }
    unalias pnpm 2>/dev/null; pnpm() { _sandflox_blocked pnpm; }
    unalias cargo 2>/dev/null; cargo() { _sandflox_blocked cargo; }
    unalias go 2>/dev/null; go() { _sandflox_blocked go; }
    unalias gem 2>/dev/null; gem() { _sandflox_blocked gem; }
    unalias composer 2>/dev/null; composer() { _sandflox_blocked composer; }
    unalias uv 2>/dev/null; uv() { _sandflox_blocked uv; }
    unalias docker 2>/dev/null; docker() { _sandflox_blocked docker; }
    unalias podman 2>/dev/null; podman() { _sandflox_blocked podman; }
    export -f _sandflox_blocked flox nix nix-env nix-store nix-shell nix-build apt apt-get yum dnf brew snap flatpak pip pip3 npm npx yarn pnpm cargo go gem composer uv docker podman

    # Python safety flags
    export PYTHON_NOPIP=1
    export PYTHONDONTWRITEBYTECODE=1

    echo "[flox-sbx] WARNING: running with fallback enforcement (no sandflox prepare artifacts)" >&2
  fi

  # Final breadcrumb cleanup (in case hook didn't run or was skipped)
  unset FLOX_ENV_PROJECT FLOX_ENV_DIRS FLOX_PATH_PATCHED
"""

# ── Environment Variables ────────────────────────────────
[vars]
SANDFLOX_ENABLED = "1"
SANDFLOX_MODE = "enforced"
