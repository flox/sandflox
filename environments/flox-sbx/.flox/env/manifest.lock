    "vars": {
      "SANDFLOX_ENABLED": "1",
      "SANDFLOX_MODE": "enforced"
    },
    "hook": {
      "on-activate": "  # ── Layer 1: PATH wipe ──────────────────────────────────\n  # Remove all system paths. After this, only $FLOX_ENV/bin is on PATH.\n  export PATH=\"$FLOX_ENV/bin\"\n\n  # ── Layer 5: Generate enforcement artifacts ─────────────\n  # sandflox prepare writes to $FLOX_ENV_CACHE/sandflox/:\n  #   entrypoint.sh, fs-filter.sh, usercustomize.py,\n  #   config.json, requisites.txt, path lists, mode files\n  #\n  # Three-tier fallback:\n  #   1. SANDFLOX_POLICY_PATH env var (explicit override)\n  #   2. FLOX_ENV_PROJECT/policy.toml (developer's project)\n  #   3. Bare `sandflox prepare` (uses embedded default policy)\n  _sfx_policy=\"${SANDFLOX_POLICY_PATH:-}\"\n  if [ -n \"$_sfx_policy\" ] && [ -f \"$_sfx_policy\" ]; then\n    sandflox prepare -policy \"$_sfx_policy\" || echo \"[flox-sbx] WARNING: sandflox prepare failed -- profile fallback will apply\" >&2\n  elif [ -n \"${FLOX_ENV_PROJECT:-}\" ] && [ -f \"${FLOX_ENV_PROJECT}/policy.toml\" ]; then\n    sandflox prepare -policy \"${FLOX_ENV_PROJECT}/policy.toml\" || echo \"[flox-sbx] WARNING: sandflox prepare failed -- profile fallback will apply\" >&2\n  else\n    # No policy.toml found anywhere -- sandflox prepare uses embedded default\n    sandflox prepare || echo \"[flox-sbx] WARNING: sandflox prepare failed -- profile fallback will apply\" >&2\n  fi\n\n  # ── Layer 4: Breadcrumb cleanup ─────────────────────────\n  unset FLOX_ENV_PROJECT FLOX_ENV_DIRS FLOX_PATH_PATCHED\n"
    },
    "profile": {
      "common": "  if [ -f \"${FLOX_ENV_CACHE}/sandflox/entrypoint.sh\" ]; then\n    # Full enforcement: generated by sandflox prepare\n    source \"${FLOX_ENV_CACHE}/sandflox/entrypoint.sh\"\n  else\n    # ── Fallback: inline basics ─────────────────────────────\n    # If sandflox prepare failed or policy.toml was missing, apply\n    # minimal shell enforcement directly.\n\n    # PATH restriction: only FLOX_ENV/bin\n    export PATH=\"$FLOX_ENV/bin\"\n\n    # Function armor: block 26 package managers\n    _sandflox_blocked() {\n      echo \"[sandflox] BLOCKED: $1 is not available. Environment is immutable.\" >&2\n      return 126\n    }\n    flox() { _sandflox_blocked flox; }\n    nix() { _sandflox_blocked nix; }\n    nix-env() { _sandflox_blocked nix-env; }\n    nix-store() { _sandflox_blocked nix-store; }\n    nix-shell() { _sandflox_blocked nix-shell; }\n    nix-build() { _sandflox_blocked nix-build; }\n    apt() { _sandflox_blocked apt; }\n    apt-get() { _sandflox_blocked apt-get; }\n    yum() { _sandflox_blocked yum; }\n    dnf() { _sandflox_blocked dnf; }\n    brew() { _sandflox_blocked brew; }\n    snap() { _sandflox_blocked snap; }\n    flatpak() { _sandflox_blocked flatpak; }\n    pip() { _sandflox_blocked pip; }\n    pip3() { _sandflox_blocked pip3; }\n    npm() { _sandflox_blocked npm; }\n    npx() { _sandflox_blocked npx; }\n    yarn() { _sandflox_blocked yarn; }\n    pnpm() { _sandflox_blocked pnpm; }\n    cargo() { _sandflox_blocked cargo; }\n    go() { _sandflox_blocked go; }\n    gem() { _sandflox_blocked gem; }\n    composer() { _sandflox_blocked composer; }\n    uv() { _sandflox_blocked uv; }\n    docker() { _sandflox_blocked docker; }\n    podman() { _sandflox_blocked podman; }\n    export -f _sandflox_blocked flox nix nix-env nix-store nix-shell nix-build apt apt-get yum dnf brew snap flatpak pip pip3 npm npx yarn pnpm cargo go gem composer uv docker podman\n\n    # Python safety flags\n    export PYTHON_NOPIP=1\n    export PYTHONDONTWRITEBYTECODE=1\n\n    echo \"[flox-sbx] WARNING: running with fallback enforcement (no sandflox prepare artifacts)\" >&2\n  fi\n\n  # Final breadcrumb cleanup (in case hook didn't run or was skipped)\n  unset FLOX_ENV_PROJECT FLOX_ENV_DIRS FLOX_PATH_PATCHED\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "x86_64-darwin"
      ]
    }
