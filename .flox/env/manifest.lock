      "SANDFLOX_MODE": "enforced"
    },
    "hook": {
      "on-activate": "  # ── Layer 1: Wipe system PATH ────────────────────────────────\n  # After this hook, Flox prepends $FLOX_ENV/bin to PATH.\n  # By clearing PATH here, the final result is ONLY $FLOX_ENV/bin.\n  # No system flox, nix, brew, pip, npm, docker, etc.\n  #\n  # We can still use commands during the hook because it runs\n  # with the original PATH. The wipe only takes effect afterward.\n\n  # Stage requisites.txt into the cache so the profile can find it\n  # without needing FLOX_ENV_PROJECT (which we're about to scrub).\n  _sfx_stage=\"${FLOX_ENV_CACHE}/sandflox\"\n  mkdir -p \"$_sfx_stage\"\n  if [ -f \"${FLOX_ENV_PROJECT}/requisites.txt\" ]; then\n    cp \"${FLOX_ENV_PROJECT}/requisites.txt\" \"$_sfx_stage/requisites.txt\"\n  fi\n\n  # Replace system PATH with ONLY Flox-installed packages.\n  # This is the package-level whitelist — no system flox, nix,\n  # brew, pip, npm, docker, etc. Only what's in [install].\n  export PATH=\"$FLOX_ENV/bin\"\n\n  # Neutralize Python's ensurepip so agents can't bootstrap pip.\n  # Also block venv creation (which bundles pip).\n  export PYTHON_NOPIP=1\n  _sfx_pyver=$(python3 -c 'import sys; print(f\"{sys.version_info.major}.{sys.version_info.minor}\")' 2>/dev/null || echo \"3.13\")\n  _sfx_ensurepip=\"$FLOX_ENV/lib/python${_sfx_pyver}/ensurepip\"\n  if [ -d \"$_sfx_ensurepip\" ]; then\n    export PYTHONDONTWRITEBYTECODE=1\n    # Create a site-customize that neuters ensurepip at import time\n    _sfx_sitecust=\"${FLOX_ENV_CACHE}/sandflox-python\"\n    mkdir -p \"$_sfx_sitecust\"\n    cat > \"$_sfx_sitecust/usercustomize.py\" << 'PYEOF'\nimport importlib, types\n_blocked = types.ModuleType(\"ensurepip\")\n_blocked.__doc__ = \"Blocked by sandflox\"\n_blocked._ENSUREPIP_DISABLED = True\ndef _noop(*a,**k): raise SystemExit(\"[sandflox] BLOCKED: ensurepip is disabled in this sandbox\")\n_blocked.bootstrap = _noop\n_blocked.version = _noop\nimport sys\nsys.modules[\"ensurepip\"] = _blocked\nPYEOF\n    export PYTHONUSERBASE=\"$_sfx_sitecust\"\n    export ENABLE_USER_SITE=1\n    export PYTHONPATH=\"${_sfx_sitecust}:${PYTHONPATH:-}\"\n  fi\n\n  # Breadcrumb cleanup — scrub env vars an agent could use to escape\n  unset FLOX_ENV_PROJECT FLOX_ENV_DIRS FLOX_PATH_PATCHED\n"
    },
    "profile": {
      "common": "  # ── Layer 2: Binary-level filtering (requisites.txt) ──────────\n  # The hook gave us $FLOX_ENV/bin (package-level whitelist).\n  # Now filter down to individual binaries via requisites.txt.\n  # This is the \"plastic shovel and pail\" granularity.\n\n  _sfx_req=\"${FLOX_ENV_CACHE}/sandflox/requisites.txt\"\n\n  if [ -f \"$_sfx_req\" ]; then\n    _sfx_bin=\"${FLOX_ENV_CACHE}/sandflox/bin\"\n    rm -rf \"$_sfx_bin\"\n    mkdir -p \"$_sfx_bin\"\n    _sfx_count=0\n\n    while IFS= read -r _sfx_line || [ -n \"$_sfx_line\" ]; do\n      case \"$_sfx_line\" in \\#*|\"\") continue ;; esac\n      _sfx_tool=\"${_sfx_line%% *}\"\n      _sfx_tool=\"${_sfx_tool%%\t*}\"\n      [ -z \"$_sfx_tool\" ] && continue\n      if [ -x \"${FLOX_ENV}/bin/$_sfx_tool\" ]; then\n        ln -sf \"${FLOX_ENV}/bin/$_sfx_tool\" \"${_sfx_bin}/$_sfx_tool\"\n        _sfx_count=$((_sfx_count + 1))\n      fi\n    done < \"$_sfx_req\"\n\n    export PATH=\"$_sfx_bin\"\n    echo \"[sandflox] Sandbox active: $_sfx_count tools from requisites.txt\"\n  else\n    echo \"[sandflox] Sandbox active: $(ls \"$FLOX_ENV/bin\" | wc -l | tr -d \" \") tools (package-level, no requisites.txt)\"\n  fi\n\n  # ── Layer 3: Shell Function Armor ─────────────────────────────\n  # Defense in depth. Catches agents calling blocked tools by name,\n  # even via absolute paths or after unsetting PATH.\n\n  _sandflox_blocked() {\n    echo \"[sandflox] BLOCKED: $1 is not available. Environment is immutable.\" >&2\n    return 126\n  }\n\n  flox()      { _sandflox_blocked flox; }\n  nix()       { _sandflox_blocked nix; }\n  nix-env()   { _sandflox_blocked nix-env; }\n  nix-store() { _sandflox_blocked nix-store; }\n  nix-shell() { _sandflox_blocked nix-shell; }\n  nix-build() { _sandflox_blocked nix-build; }\n  apt()       { _sandflox_blocked apt; }\n  apt-get()   { _sandflox_blocked apt-get; }\n  yum()       { _sandflox_blocked yum; }\n  dnf()       { _sandflox_blocked dnf; }\n  brew()      { _sandflox_blocked brew; }\n  snap()      { _sandflox_blocked snap; }\n  flatpak()   { _sandflox_blocked flatpak; }\n  pip()       { _sandflox_blocked pip; }\n  pip3()      { _sandflox_blocked pip3; }\n  npm()       { _sandflox_blocked npm; }\n  npx()       { _sandflox_blocked npx; }\n  yarn()      { _sandflox_blocked yarn; }\n  pnpm()      { _sandflox_blocked pnpm; }\n  cargo()     { _sandflox_blocked cargo; }\n  go()        { _sandflox_blocked go; }\n  gem()       { _sandflox_blocked gem; }\n  composer()  { _sandflox_blocked composer; }\n  uv()        { _sandflox_blocked uv; }\n  docker()    { _sandflox_blocked docker; }\n  podman()    { _sandflox_blocked podman; }\n\n  export -f _sandflox_blocked \\\n    flox nix nix-env nix-store nix-shell nix-build \\\n    apt apt-get yum dnf brew snap flatpak \\\n    pip pip3 npm npx yarn pnpm cargo go gem composer uv \\\n    docker podman\n\n  # ── Layer 4: Breadcrumb Cleanup ───────────────────────────────\n  unset FLOX_ENV_PROJECT FLOX_ENV_DIRS FLOX_PATH_PATCHED\n  unset _sfx_bin _sfx_req _sfx_count _sfx_line _sfx_tool\n"
    },
